<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registratin Form</title>
</head>
<body>
    <!-- heading -->
     <h1><center><u>Student Registration Form</u></center></h1>
    <form>
        <!-- Personal Information -->
         <style>
            fieldset
            {
                background-color: rgb(153, 215, 230);
                width: 50%;
                margin: auto;
            }

         </style>

         <fieldset>
            <legend>Personal Information</legend><br>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter name" required><br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="abc@example.com" required><br><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="*********" required><br><br>
            <label for ="number">Phone Number:</label>
            <input type="tel" id="number" name="number" placeholder="123-456-7890" required><br><br>
            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob" required><br><br>
         </fieldset>
         <br>
         <!-- Gender information -->
         <fieldset>
            <legend>Gender</legend><br>
            <input type="radio" id="male" name="gender" value="male" required>
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female" required>
            <label for="female">Female</label>
            <input type="radio" id="other" name="gender" value="other" required>
            <label for="other">Other</label>
         </fieldset>
         <br>
         <!-- Course Information -->
         <fieldset>
            <legend>Course Information</legend><br>
            <label for="course">Select Course:</label>
            <select id="course" name="course" required>
                <option value="">--Choose a course--</option>
                <option value="computer-science">Computer Science</option>
                <option value="mathematics">Mathematics</option>
                <option value="physics">Physics</option>
            </select><br><br>
         </fieldset>
         <br>
         <!-- Address Information -->
         <fieldset>
            <legend>Address</legend><br>
            <label for="address">Address:</label><br>
            <textarea id="address" name="address" rows="4" cols="50" placeholder="Enter your address here..." required></textarea><br><br>
            </fieldset>
            <br>
         <center><input type="submit" style="background-color: chartreuse;" value="Submit"> </center>
    </form>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student marksheet table</title>
</head>
<body>
    <!-- header -->
    <header>
        <h2>Student Marksheet</h2>

        <table border="1">
            <thead>
                <tr>
                    <th>Student Name</th>
                    <th>Subject</th>
                    <th>Marks</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td rowspan="2">Adi</td>
                    <td>Html</td>
                    <td>85</td>
                </tr>
                <tr>
                    <td>Java script</td>
                    <td>92</td>
                </tr>
                <tr>
                    <td rowspan="2">Lisha</td>
                    <td>Css</td>
                    <td>88</td>
                </tr>
                <tr>
                    <td>Html</td>
                    <td>90</td>
                </tr>
                <tfoot>
                    <tr>
                        <td colspan="2">Total Marks</td>
                        <td>355</td>
                    </tr>
                </tfoot>
            </tbody>
        </table>
    </header>

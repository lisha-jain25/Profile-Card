<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Structure</title>
</head>
<style>
    *{
        padding: -0;
        box-sizing: border-box;
    }

</style>
<body>
    <div style="width: 100vw; height: 100vh; border: 5px solid black;">
        <div style="width: 100vw; height: 30vh; background-color:wheat;">
            <div style="width: 100%; height: 50%; border: 4px solid palevioletred">
                <div style="display: flex; justify-content: space-evenly;">
                <h3>Amazon</h3>
                <p>Varodara</p>
                <div>
                    <input type="text">
                    <button type="search" style="margin-top: 15px;">Search</button>
                    
                </div>
                <p>Account</p>
                <p>Cart</p>
                </div>
            </div>
            <div style="width: 100%; height: 30%; border: 4px solid green">
                <ul style="display: flex; justify-content: space-evenly; list-style-type: none;">
                    <li>All</li>
                    <li>Amazon Pay</li>
                    <li>Mobiles</li>
                    <li>Customer Service</li>
                    <li>Today's Deals</li>
                    <li>Fashion</li>
            </div> 
            <div style="width: 100%; height: 79vh; background-color:goldenrod;">
                <table>
                    <div style="display: flex; justify-content: space-evenly;">
                        <img src="https://images-eu.ssl-images-amazon.com/images/G/31/img26/Consumables/Grocery/PC-Hero_3000x1200._CB782932305_.jpg" alt="Amazon" width="100%">
                    </div>
                </table>
            </div>
             <div>
                <div style="display: flex; width: 30%; height: 50%;"
             </div>
        </div>
    </div>
       
        
</body>
</html>
